<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrevista Online — Scapini Transportes</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f4f4;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      width: 100%;
      background: #cc1c1c;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header img { height: 40px; }
    header span { color: #fff; font-size: 18px; font-weight: 600; }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.1);
      padding: 32px;
      max-width: 620px;
      width: 100%;
      margin: 32px 16px;
    }

    .lumina-avatar {
      width: 56px; height: 56px;
      background: #1a1a2e;
      border-radius: 50%;
      border: 2px solid #cc1c1c;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px;
      margin-bottom: 12px;
    }

    .chat { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 15px;
    }
    .msg.lumina {
      background: #f0f0f0;
      align-self: flex-start;
      border-radius: 4px 12px 12px 12px;
    }
    .msg.candidato {
      background: #cc1c1c;
      color: #fff;
      align-self: flex-end;
      border-radius: 12px 4px 12px 12px;
    }

    .progress-bar {
      height: 6px; background: #eee; border-radius: 3px; margin-bottom: 20px;
    }
    .progress-fill { height: 100%; background: #cc1c1c; border-radius: 3px; transition: width .4s; }
    .progress-label { font-size: 13px; color: #888; margin-bottom: 8px; }

    textarea {
      width: 100%; border: 1.5px solid #ddd; border-radius: 8px;
      padding: 12px; font-size: 15px; resize: vertical; min-height: 80px;
      font-family: inherit; transition: border .2s;
    }
    textarea:focus { outline: none; border-color: #cc1c1c; }

    button.btn-enviar {
      background: #cc1c1c; color: #fff; border: none; border-radius: 8px;
      padding: 12px 28px; font-size: 16px; font-weight: 600; cursor: pointer;
      margin-top: 10px; transition: background .2s; width: 100%;
    }
    button.btn-enviar:hover { background: #a51515; }
    button.btn-enviar:disabled { background: #ccc; cursor: not-allowed; }

    .concluido {
      text-align: center; padding: 20px 0;
    }
    .concluido .check { font-size: 56px; margin-bottom: 12px; }
    .concluido h2 { color: #cc1c1c; margin-bottom: 8px; }
    .concluido p { color: #555; line-height: 1.6; }

    .erro { text-align: center; color: #cc1c1c; padding: 40px 0; }

    .typing { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing span { width: 8px; height: 8px; background: #aaa; border-radius: 50%; animation: bounce .8s infinite; }
    .typing span:nth-child(2) { animation-delay: .15s; }
    .typing span:nth-child(3) { animation-delay: .3s; }
    @keyframes bounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }
  </style>
</head>
<body>
  <header>
    <img src="https://www.scapini.com.br/wp-content/uploads/2023/04/logo-scapini.png" alt="Scapini" onerror="this.style.display='none'">
    <span>Processo Seletivo Online</span>
  </header>

  <div class="card" id="app">
    <div style="text-align:center;padding:40px 0;color:#888">Carregando...</div>
  </div>

  <script>
    const token = location.pathname.split('/').pop();
    let estado = null;

    async function carregar() {
      try {
        const r = await fetch(`/api/candidatura/${token}`);
        if (!r.ok) throw new Error('Token inválido');
        estado = await r.json();
        renderizar();
      } catch(e) {
        document.getElementById('app').innerHTML = `<div class="erro"><h2>😕 Link inválido</h2><p>Este link não existe ou expirou.<br>Entre em contato com a Scapini pelo site.</p></div>`;
      }
    }

    function renderizar() {
      const app = document.getElementById('app');
      if (estado.concluida) {
        app.innerHTML = `
          <div class="concluido">
            <div class="check">✅</div>
            <h2>Entrevista concluída!</h2>
            <p>Obrigado, <strong>${estado.nome}</strong>!<br>
            Suas respostas foram enviadas para a equipe de RH da Scapini.<br>
            Entraremos em contato em breve.</p>
          </div>`;
        return;
      }

      const total = estado.total || 5;
      const respondidas = estado.respondidas || 0;
      const pct = Math.round((respondidas / total) * 100);

      app.innerHTML = `
        <div class="lumina-avatar">🤖</div>
        <p style="font-size:13px;color:#888;margin-bottom:20px">
          Olá, <strong>${estado.nome}</strong> · Vaga: <strong>${estado.vaga}</strong>
        </p>

        <p class="progress-label">Pergunta ${respondidas + 1} de ${total}</p>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>

        <div class="chat" id="chat">
          <div class="msg lumina">${estado.proxima}</div>
        </div>

        <textarea id="resp" placeholder="Digite sua resposta aqui..." rows="3"></textarea>
        <button class="btn-enviar" id="btn" onclick="enviar()">Enviar resposta →</button>
      `;

      document.getElementById('resp').focus();
      document.getElementById('resp').addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.ctrlKey) enviar();
      });
    }

    function mostrarCarregando() {
      const app = document.getElementById('app');
      app.innerHTML = `
        <div style="text-align:center;padding:60px 0">
          <div class="typing" style="justify-content:center;margin-bottom:12px">
            <span></span><span></span><span></span>
          </div>
          <p style="color:#888;font-size:14px">Lúmina está preparando a próxima pergunta...</p>
        </div>`;
    }

    async function enviar() {
      const resp = document.getElementById('resp').value.trim();
      if (!resp) return;

      document.getElementById('btn').disabled = true;
      mostrarCarregando();

      try {
        const r = await fetch(`/api/candidatura/${token}/responder`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ resposta: resp }),
        });
        const d = await r.json();

        if (!r.ok) throw new Error(d.error || 'Erro no servidor');

        if (d.concluida) {
          estado.concluida = true;
          renderizar();
        } else {
          estado.respondidas = d.respondidas;
          estado.total = d.total;
          estado.proxima = d.proxima;
          renderizar();
        }
      } catch(e) {
        renderizar();
        alert('Erro ao enviar resposta. Tente novamente.\n' + e.message);
      }
    }

    carregar();
  </script>
</body>
</html>
