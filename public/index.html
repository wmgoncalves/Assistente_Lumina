<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lúmina</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="voice-group">
      <button class="voice-btn active" id="btn-voice-male">VOZ MASCULINA</button>
      <button class="voice-btn" id="btn-voice-female">VOZ FEMININA</button>
    </div>
    <nav class="feat-group">
      <button class="feat-btn" id="btn-camera">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        VER CÂMERA
      </button>
      <button class="feat-btn" id="btn-file">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        ANALISAR ARQUIVO
      </button>
      <button class="feat-btn" id="btn-continuous">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        <span id="cont-label">CONVERSA CONTÍNUA: OFF</span>
      </button>
      <button class="feat-btn icon-btn" id="btn-history" title="Histórico">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </button>
      <button class="feat-btn icon-btn" id="btn-memory" title="Memória">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
      </button>
      <button class="feat-btn icon-btn" id="btn-settings" title="Configurações">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </nav>
  </header>

  <main class="main-area">

    <aside class="side-panel" id="history-panel">
      <div class="panel-head"><span>HISTÓRICO</span><button class="x-btn" id="btn-close-history">✕</button></div>
      <div class="panel-body" id="history-msgs"></div>
    </aside>

    <aside class="side-panel left-panel" id="memory-panel">
      <div class="panel-head"><span>MEMÓRIA</span><button class="x-btn" id="btn-close-memory">✕</button></div>
      <div class="panel-body" id="memory-list"></div>
      <div class="panel-foot"><button class="ghost-btn full" id="btn-clear-memory">Limpar Memória</button></div>
    </aside>

    <section class="center">
      <div class="avatar-wrap">
        <svg class="face" id="face" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="faceBg" cx="42%" cy="36%" r="70%">
              <stop offset="0%" stop-color="#002214"/>
              <stop offset="55%" stop-color="#000e09"/>
              <stop offset="100%" stop-color="#000000"/>
            </radialGradient>
            <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>
          <circle cx="100" cy="100" r="97" fill="none" stroke="#34d399" stroke-width="10" opacity="0.07"/>
          <circle cx="100" cy="100" r="97" fill="none" stroke="#10b981" stroke-width="4"  opacity="0.28"/>
          <circle cx="100" cy="100" r="97" fill="none" stroke="#6ee7b7" stroke-width="2"  opacity="0.9"/>
          <circle cx="100" cy="100" r="94" fill="url(#faceBg)"/>
          <ellipse id="el" cx="72"  cy="81" rx="11" ry="11" fill="white" filter="url(#glow)"/>
          <ellipse id="er" cx="128" cy="81" rx="11" ry="11" fill="white" filter="url(#glow)"/>
          <path id="mo" d="M 74 122 Q 100 144 126 122" fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        </svg>
      </div>

      <p class="resp-text" id="resp-text"></p>
      <p class="status-text" id="user-said"></p>
      <div class="learn-badge" id="learn-badge">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        Memória atualizada
      </div>
    </section>

  </main>

  <footer class="bottombar">
    <button class="mic-btn" id="btn-mic" title="Clique para falar (Espaço)">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <span class="mic-label">C L I Q U E &nbsp; E &nbsp; F A L E</span>
    <div class="text-row">
      <input type="text" id="text-input" class="text-fld" placeholder="Ou digite aqui e pressione Enter…" autocomplete="off">
      <label id="btn-audio-upload" title="Enviar áudio do WhatsApp" style="cursor:pointer;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);color:#ccc;flex-shrink:0;transition:background .2s" onmouseover="this.style.background='rgba(255,255,255,0.18)'" onmouseout="this.style.background='rgba(255,255,255,0.08)'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        <input type="file" id="audio-file-input" accept=".opus,.ogg,.m4a,.mp3,.wav,.aac,.ptt,.flac,.webm" style="display:none">
      </label>
      <button class="send-btn" id="btn-send">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
  </footer>

  <!-- Camera modal -->
  <div class="overlay" id="cam-modal">
    <div class="cam-box">
      <div class="cam-head"><span>Câmera ao Vivo</span><button class="x-btn" id="btn-cam-close">✕</button></div>
      <video id="cam-vid" autoplay playsinline muted></video>
      <canvas id="cap-canvas" style="display:none"></canvas>
      <div class="cam-foot"><button class="green-btn" id="btn-capture">Capturar e Analisar</button></div>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*,.txt" style="display:none">

  <!-- Settings modal -->
  <div class="overlay" id="set-modal">
    <div class="modal-box">
      <button class="x-btn abs-top" id="btn-set-close">✕</button>
      <h3 class="modal-ttl">Configurações</h3>

      <label class="fld-lbl">Seu Nome</label>
      <input type="text" id="inp-username" class="fld" placeholder="Como devo chamá-lo?">

      <label class="fld-lbl" style="margin-top:1.1rem">
        Chave Gemini API
        <a href="https://ai.google.dev" target="_blank" style="color:var(--accent);font-size:0.68rem;margin-left:0.4rem">Obter grátis →</a>
      </label>
      <input type="password" id="inp-gemini" class="fld" placeholder="AIzaSy… (deixe em branco para manter a atual)">
      <p class="fld-hint">Gratuita em ai.google.dev • Chave salva no servidor, não no navegador.</p>

      <label class="fld-lbl" style="margin-top:1.1rem">
        ElevenLabs API Key
        <span style="color:var(--accent);font-size:0.68rem;margin-left:0.3rem">Voz Jarvis premium</span>
      </label>
      <input type="password" id="inp-eleven" class="fld" placeholder="Opcional — deixe em branco para manter a atual">
      <p class="fld-hint">Voz em português de alta qualidade. Gratuito em elevenlabs.io</p>

      <div id="cfg-status" style="margin-top:1rem;font-size:0.78rem;color:var(--text-dim)"></div>

      <div class="modal-acts">
        <button class="ghost-btn" id="btn-set-cancel">Cancelar</button>
        <button class="green-btn" id="btn-set-save">Salvar</button>
      </div>
    </div>
  </div>

  <div id="toasts"></div>
  <script src="app.js"></script>
</body>
</html>
